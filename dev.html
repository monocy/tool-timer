<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Timer Dev Mode - Free Web Tools</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
  <style>
    .font-mono-custom {
      font-family: 'Share Tech Mono', monospace;
    }
    :root {
      --bg-card: rgba(17, 24, 39, 0.7);
      --border-color: rgba(255, 255, 255, 0.1);
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --accent-color: #00f0ff;
      --accent-glow-intensity: 0 0 10px rgba(0, 240, 255, 0.5);
    }
    .glass-panel {
      background: rgba(31, 41, 55, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .neon-shadow {
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37), 
                  0 0 20px 0 rgba(0, 240, 255, 0.15);
    }
    [v-cloak] {
      display: none;
    }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex flex-col items-center justify-center p-4">

  <div id="app" v-cloak class="w-full max-w-2xl">
    <!-- Dev Mode Notice -->
    <div class="mb-4 text-center text-xs text-cyan-400 font-mono tracking-wider">
      [ STANDALONE DEV MODE ]
    </div>
    
    <tool-workspace v-if="translations" :settings="settings" :translations="translations"></tool-workspace>
    <div v-else class="text-center py-8">Loading translations...</div>
  </div>

  <script src="./js/workspace.js"></script>
  <script>
    const { createApp, ref, reactive } = Vue;

    createApp({
      components: {
        ToolWorkspace
      },
      setup() {
        const settings = reactive({
          lang: 'en',
          theme: 'dark'
        });

        const translations = ref(null);

        // Fetch local i18n.json
        fetch('./i18n.json')
          .then(res => {
            if (!res.ok) throw new Error('Fetch failed');
            return res.json();
          })
          .then(data => {
            translations.value = data;
          })
          .catch(err => {
            console.error('Failed to load i18n.json, falling back to mock translations:', err);
            // fallback
            translations.value = {
              "en": {
                            "tool_title": "Premium Countdown Timer",
                            "description": "Responsive countdown timer with visual and audio alerts.",
                            "page_title": "Premium Timer - Free Web Tools"
              },
              "ja": {
                            "tool_title": "プレミアム・タイマー",
                            "description": "視覚的および音響的なアラート機能を備えたレスポンシブなカウントダウンタイマー。",
                            "page_title": "プレミアムタイマー - 無料ウェブツール"
              }
};
          });

        return {
          settings,
          translations
        };
      }
    }).mount('#app');
  </script>
</body>
</html>
