<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Timer - Free Web Tools</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
  
  <script>
    (() => {
      const isLocalFile = window.location.protocol === 'file:';
      const baseDir = isLocalFile ? '../../../../../' : '../../';

      // Load CSS
      const link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = baseDir + 'static/css/portal.css';
      document.head.appendChild(link);

      // Load Scripts
      const commonScripts = [
        'static/js/portal_common.js',
        'static/js/settings_modal.js',
        'static/js/background_modal.js',
        'static/js/portal_components.js'
      ];

      function loadScripts(index) {
        if (index >= commonScripts.length) {
          window.dispatchEvent(new Event('common-assets-loaded'));
          return;
        }
        const script = document.createElement('script');
        script.src = baseDir + commonScripts[index];
        script.onload = () => loadScripts(index + 1);
        script.onerror = () => console.error('Failed to load: ' + script.src);
        document.head.appendChild(script);
      }
      loadScripts(0);
    })();
  </script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            neonBlue: '#00f0ff',
            neonGreen: '#39ff14',
            neonPurple: '#d300ff',
            neonRed: '#ff073a',
            slateDark: '#0b0f19'
          }
        }
      }
    }
  </script>
  <style>
    .font-mono-custom {
      font-family: 'Share Tech Mono', monospace;
    }
  </style>
</head>
<body class="bg-[var(--bg-primary)] text-[var(--text-main)] min-h-screen relative overflow-hidden flex flex-col justify-between transition-colors duration-300" id="theme-root">

  <div id="app" v-cloak class="min-h-screen w-full flex flex-col justify-between relative z-10">
    
    <!-- Dynamic Background Image Layer -->
    <div class="absolute inset-0 pointer-events-none transition-all duration-500 z-0 bg-cover bg-center"
         :style="{ 
           backgroundImage: settings.bgUrl ? 'url(' + settings.bgUrl + ')' : 'none',
           opacity: settings.bgOpacity,
           filter: 'blur(' + settings.bgBlur + 'px)'
         }">
    </div>

    <!-- Header Navigation -->
    <portal-header 
      :settings="settings" 
      :translations="translations" 
      :is-fullscreen="isFullscreen" 
      @toggle-fullscreen="toggleFullscreen" 
      @toggle-theme="toggleTheme" 
      @open-settings="isSettingsOpen = true"
    ></portal-header>

    <!-- Main Workspace Container -->
    <main class="relative z-10 w-full max-w-4xl mx-auto flex-grow flex flex-col items-center justify-center px-6 py-12">
      <tool-workspace v-if="translations" :settings="settings" :translations="translations"></tool-workspace>
    </main>

    <!-- Footer Controls -->
    <portal-footer></portal-footer>

    <!-- Floating Fullscreen Button -->
    <portal-controls
      :settings="settings"
      :translations="translations"
      @toggle-fullscreen="toggleFullscreen"
    ></portal-controls>

    <!-- Settings Modal Component -->
    <settings-modal 
      :settings="settings" 
      :translations="translations" 
      :is-open="isSettingsOpen" 
      @close="isSettingsOpen = false"
      @reset="resetToDefault"
      @open-bg-modal="isBgModalOpen = true"
    ></settings-modal>

    <!-- Background Modal Component -->
    <background-modal 
      :settings="settings" 
      :translations="translations" 
      :is-open="isBgModalOpen" 
      @close="isBgModalOpen = false"
    ></background-modal>

  </div>

  <script src="./js/workspace.js"></script>
  <script>
    window.addEventListener('common-assets-loaded', () => {
      (() => {
        const { createApp, ref, reactive, watch } = Vue;

        const DEFAULT_SETTINGS = {
          lang: 'en',
          theme: 'dark',
          bgUrl: 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1964&auto=format&fit=crop',
          bgOpacity: 0.15,
          bgBlur: 8,
          custom: {}
        };

        createApp({
          components: {
            SettingsModal,
            BackgroundModal,
            ToolWorkspace,
            PortalHeader,
            PortalFooter,
            PortalControls
          },
          compilerOptions: { delimiters: ['[[', ']]'] },
          setup() {
            const portal = usePortalCommon((typeof DEFAULT_SETTINGS !== 'undefined' && DEFAULT_SETTINGS.custom) || {});
            const { settings, showSettings: isSettingsOpen, isBgModalOpen, isFullscreen, translations, t, toggleFullscreen, toggleTheme } = portal;

            const originalTitle = document.title;
            const updateDocumentMetadata = () => {
              const pageTitle = t('page_title');
              document.title = (pageTitle === 'page_title' || !pageTitle) ? originalTitle : pageTitle;
              document.documentElement.lang = settings.lang;
            };

            const closeSettings = () => {
              isSettingsOpen.value = false;
            };

            const resetToDefault = () => {
              portal.resetSettings();
              updateDocumentMetadata();
            };

            const setTheme = (themeName) => {
              settings.theme = themeName;
            };

            const setLang = (langCode) => {
              settings.lang = langCode;
            };

            // Watch translations and lang changes to reactively update document details
            watch([translations, () => settings.lang], () => {
              updateDocumentMetadata();
            }, { deep: true, immediate: true });

            return {
              isSettingsOpen,
              isBgModalOpen,
              isFullscreen,
              settings,
              translations,
              t,
              setTheme,
              setLang,
              closeSettings,
              resetToDefault,
              toggleFullscreen,
              toggleTheme
            };
          }
        }).mount('#app');
      })();
    });
  </script>
</body>
</html>
